name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run build
      - run: bun run typecheck
      - run: bun run typecheck:examples
      - run: bun run test
      - run: bun run pack:check
      - run: bun run publint
      - run: bun run attw
